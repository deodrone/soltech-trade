name: Post to X (Twitter)

on:
  push:
    branches: [main]
  schedule:
    # Post a weekly update every Monday at 12:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message to post'
        required: false

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Twitter client
        run: npm install twitter-api-v2

      - name: Post update to X
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          CUSTOM_MESSAGE: ${{ github.event.inputs.message }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: node .github/scripts/post-x-update.js
