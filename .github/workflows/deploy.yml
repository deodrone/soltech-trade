name: Deploy Frontend to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VUE_APP_FIREBASE_API_KEY: ${{ secrets.VUE_APP_FIREBASE_API_KEY }}
          VUE_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.VUE_APP_FIREBASE_AUTH_DOMAIN }}
          VUE_APP_FIREBASE_PROJECT_ID: ${{ secrets.VUE_APP_FIREBASE_PROJECT_ID }}
          VUE_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.VUE_APP_FIREBASE_STORAGE_BUCKET }}
          VUE_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VUE_APP_FIREBASE_MESSAGING_SENDER_ID }}
          VUE_APP_FIREBASE_APP_ID: ${{ secrets.VUE_APP_FIREBASE_APP_ID }}
          VUE_APP_API_BASE_URL: ${{ secrets.VUE_APP_API_BASE_URL }}
          VUE_APP_HELIUS_API_KEY: ${{ secrets.VUE_APP_HELIUS_API_KEY }}
          VUE_APP_PLATFORM_WALLET: ${{ secrets.VUE_APP_PLATFORM_WALLET }}
          VUE_APP_REFERRAL_ACCOUNT: ${{ secrets.VUE_APP_REFERRAL_ACCOUNT }}
          VUE_APP_PLATFORM_FEE_BPS: ${{ secrets.VUE_APP_PLATFORM_FEE_BPS }}
          VUE_APP_SOLTECH_TOKEN_MINT: ${{ secrets.VUE_APP_SOLTECH_TOKEN_MINT }}
          VUE_APP_LAUNCH_FEE_SOL:        ${{ secrets.VUE_APP_LAUNCH_FEE_SOL }}
          VUE_APP_WS_URL:                ${{ secrets.VUE_APP_WS_URL }}
          VUE_APP_JUPITER_API_KEY:       ${{ secrets.VUE_APP_JUPITER_API_KEY }}
        run: npm run build

      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
