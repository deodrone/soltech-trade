[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

  # ── Backend (via Netlify proxy — no mixed-content issues) ─────────────────
  # All /api/* and /ws calls go through Netlify → EB over server-to-server HTTP
  VUE_APP_API_BASE_URL = "https://soltech-trade.netlify.app"
  VUE_APP_WS_URL       = "wss://soltech-trade.netlify.app"

  # ── Firebase (client-side config — public by design) ──────────────────────
  VUE_APP_FIREBASE_API_KEY              = "AIzaSyAGVE3_w1YKvnnMtnpJmiDSxMNd52v1DeQ"
  VUE_APP_FIREBASE_AUTH_DOMAIN          = "studio-9317994377-242c7.firebaseapp.com"
  VUE_APP_FIREBASE_PROJECT_ID           = "studio-9317994377-242c7"
  VUE_APP_FIREBASE_STORAGE_BUCKET       = "studio-9317994377-242c7.firebasestorage.app"
  VUE_APP_FIREBASE_MESSAGING_SENDER_ID  = "489132166628"
  VUE_APP_FIREBASE_APP_ID               = "1:489132166628:web:41116c9e53cd481d760bf1"

  # ── Monetization ───────────────────────────────────────────────────────────
  VUE_APP_PLATFORM_WALLET    = "4AjejjzKDEbEtCnkdNJid7q5n6AYK9ZzHowLb1c9xmWA"
  VUE_APP_SOLTECH_TOKEN_MINT = "ZsVAw9KE4mJCNJhKPBKChqCPRHxF8F89kwxZ6zqpump"
  VUE_APP_REFERRAL_ACCOUNT   = "52YhxZo12PJbCyvVLsmpUdtvzToin27toxyaP91uzYey"
  VUE_APP_PLATFORM_FEE_BPS   = "50"
  VUE_APP_LAUNCH_FEE_SOL     = "0.1"

# ── Backend proxy (Netlify → EB over server-to-server HTTP) ──────────────────
# These MUST come before the SPA catch-all so they take priority
[[redirects]]
  from   = "/api/*"
  to     = "http://soltech-trade-backend-env.eba-bwsczaqm.us-east-1.elasticbeanstalk.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/ws"
  to     = "ws://soltech-trade-backend-env.eba-bwsczaqm.us-east-1.elasticbeanstalk.com"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "http://soltech-trade-backend-env.eba-bwsczaqm.us-east-1.elasticbeanstalk.com/health"
  status = 200
  force  = true

# ── SPA routing ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── Security & performance headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://lite-api.jup.ag https://api.jup.ag https://quote-api.jup.ag https://tokens.jup.ag https://dca-api.jup.ag https://api.dexscreener.com https://api.raydium.io https://pump.fun https://public-api.birdeye.so wss: ws:; frame-src 'none'; object-src 'none'; base-uri 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the HTML entry point or service worker
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
