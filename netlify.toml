[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VUE_APP_PLATFORM_WALLET = "4AjejjzKDEbEtCnkdNJid7q5n6AYK9ZzHowLb1c9xmWA"
  VUE_APP_SOLTECH_TOKEN_MINT = "ZsVAw9KE4mJCNJhKPBKChqCPRHxF8F89kwxZ6zqpump"
  VUE_APP_REFERRAL_ACCOUNT = "52YhxZo12PJbCyvVLsmpUdtvzToin27toxyaP91uzYey"
  VUE_APP_PLATFORM_FEE_BPS = "50"

# ── SPA routing ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security & performance headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://lite-api.jup.ag https://api.jup.ag https://quote-api.jup.ag https://tokens.jup.ag https://api.dexscreener.com https://api.raydium.io https://pump.fun https://public-api.birdeye.so wss: ws: https://*.elasticbeanstalk.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src 'none'; object-src 'none'; base-uri 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the HTML entry point or service worker
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
